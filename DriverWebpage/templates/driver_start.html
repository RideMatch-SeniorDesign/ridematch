{% extends "portal_base.html" %}
{% block title %}Start Drive{% endblock %}
{% block content %}
<section class="card wide">
  <h2>Start Drive</h2>
  <p>Starter page for beginning a drive session.</p>
  {% if notice %}<div class="success">{{ notice }}</div>{% endif %}
  <form method="post" action="{{ url_for('start_drive') }}">
    <div class="grid">
      <div>
        <label for="start_loc">Current Area</label>
        <input id="start_loc" name="start_loc" value="{{ form_data.start_loc }}" placeholder="Iowa City" />
      </div>
      <div>
        <label for="end_loc">Planned Route / Destination</label>
        <input id="end_loc" name="end_loc" value="{{ form_data.end_loc }}" placeholder="Coralville" />
      </div>
      <div>
        <label for="seats">Open Seats</label>
        <select id="seats" name="seats">
          {% for n in ["1","2","3","4","5","6"] %}
          <option value="{{ n }}" {% if form_data.seats == n %}selected{% endif %}>{{ n }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label for="availability">Availability</label>
        <select id="availability" name="availability">
          <option value="available" {% if form_data.availability == "available" %}selected{% endif %}>Available now</option>
          <option value="scheduled" {% if form_data.availability == "scheduled" %}selected{% endif %}>Scheduled later</option>
        </select>
      </div>
      <div class="full-span">
        <label for="notes">Drive Notes</label>
        <textarea id="notes" name="notes" rows="3" placeholder="Preferred zones, route notes, etc.">{{ form_data.notes }}</textarea>
      </div>
    </div>
    <button type="submit">Start Drive (Test)</button>
  </form>
</section>
{% endblock %}
