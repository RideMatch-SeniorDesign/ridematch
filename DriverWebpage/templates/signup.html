<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Driver Sign-Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='portal.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="card wide">
        <div class="brand">RideMatch Driver</div>
        <h1>Driver Sign-Up</h1>
        <p>Create a driver account with separate driver login credentials.</p>

        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="success">{{ success }}</div>{% endif %}

        <form method="post" action="{{ url_for('signup') }}">
          <div class="grid">
            <div><label for="first_name">First Name</label><input id="first_name" name="first_name" value="{{ form_data.first_name }}" required /></div>
            <div><label for="last_name">Last Name</label><input id="last_name" name="last_name" value="{{ form_data.last_name }}" required /></div>
            <div><label for="username">Username</label><input id="username" name="username" value="{{ form_data.username }}" required /></div>
            <div><label for="email">Email</label><input id="email" name="email" type="email" value="{{ form_data.email }}" required /></div>
            <div><label for="phone">Phone</label><input id="phone" name="phone" value="{{ form_data.phone }}" required /></div>
            <div><label for="preferences">Preferences</label><input id="preferences" name="preferences" value="{{ form_data.preferences }}" /></div>
            <div><label for="date_of_birth">Date of Birth</label><input id="date_of_birth" name="date_of_birth" type="date" value="{{ form_data.date_of_birth }}" /></div>
            <div><label for="license_state">License State</label><input id="license_state" name="license_state" value="{{ form_data.license_state }}" required /></div>
            <div><label for="license_number">License Number</label><input id="license_number" name="license_number" value="{{ form_data.license_number }}" required /></div>
            <div><label for="license_expires">License Expires</label><input id="license_expires" name="license_expires" type="date" value="{{ form_data.license_expires }}" /></div>
            <div><label for="insurance_provider">Insurance Provider</label><input id="insurance_provider" name="insurance_provider" value="{{ form_data.insurance_provider }}" required /></div>
            <div><label for="insurance_policy">Insurance Policy</label><input id="insurance_policy" name="insurance_policy" value="{{ form_data.insurance_policy }}" required /></div>
            <div><label for="password">Password</label><input id="password" name="password" type="password" minlength="6" required /></div>
            <div><label for="confirm_password">Confirm Password</label><input id="confirm_password" name="confirm_password" type="password" minlength="6" required /></div>
          </div>
          <button type="submit">Create Driver Account</button>
        </form>

        <div class="links">
          <a href="{{ url_for('home') }}">Back to Driver Login</a>
        </div>
      </section>
    </main>
  </body>
</html>
