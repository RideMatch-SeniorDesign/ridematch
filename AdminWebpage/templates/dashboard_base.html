<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "RideMatch Admin Dashboard" }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="dashboard">
      <header class="dashboard-head compact-head">
        <div class="brand-lockup" aria-label="RideMatch Admin">
          <span class="brand-dot"><i class="bi bi-car-front-fill"></i></span>
          <span class="brand-title">RideMatch Admin</span>
        </div>
        <nav class="top-nav" aria-label="Admin sections">
          <a class="tab {{ 'active' if current_tab == 'home' else '' }}" href="{{ url_for('home') }}">Home</a>
          <a class="tab {{ 'active' if current_tab == 'drivers' else '' }}" href="{{ url_for('drivers') }}">Drivers</a>
          <a class="tab {{ 'active' if current_tab == 'riders' else '' }}" href="{{ url_for('riders') }}">Riders</a>
          <a class="tab {{ 'active' if current_tab == 'analytics' else '' }}" href="{{ url_for('analytics') }}">Analytics</a>
          <a class="tab {{ 'active' if current_tab == 'settings' else '' }}" href="{{ url_for('settings') }}">Settings</a>
        </nav>
        <form method="post" action="{{ url_for('logout') }}" class="inline-form">
          <button class="tab danger logout-tab" type="submit">
            <i class="bi bi-box-arrow-right"></i>
            <span>Log Out</span>
          </button>
        </form>
      </header>
      {% if db_error %}
      <p class="error-banner">{{ db_error }}</p>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    {% block page_scripts %}{% endblock %}
  </body>
</html>
