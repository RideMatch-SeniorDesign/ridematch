<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RideMatch Driver Sign-Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}" />
  </head>
  <body>
    <main class="auth-card wide-card">
      <div class="brand">RideMatch Driver</div>
      <h1>Driver Sign-Up</h1>
      <p>Driver registration is separate from the admin webpage and starts in pending review.</p>

      {% if error %}
      <div class="error" role="alert">{{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="success" role="status">{{ success }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('driver_signup') }}">
        <div class="form-grid">
          <div>
            <label for="first_name">First Name</label>
            <input id="first_name" name="first_name" type="text" value="{{ form_data.first_name }}" required />
          </div>
          <div>
            <label for="last_name">Last Name</label>
            <input id="last_name" name="last_name" type="text" value="{{ form_data.last_name }}" required />
          </div>
          <div>
            <label for="username">Username</label>
            <input id="username" name="username" type="text" value="{{ form_data.username }}" required />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="{{ form_data.email }}" required />
          </div>
          <div>
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" value="{{ form_data.phone }}" required />
          </div>
          <div>
            <label for="preferences">Driver Preferences</label>
            <input id="preferences" name="preferences" type="text" value="{{ form_data.preferences }}" />
          </div>
          <div>
            <label for="date_of_birth">Date of Birth</label>
            <input id="date_of_birth" name="date_of_birth" type="date" value="{{ form_data.date_of_birth }}" />
          </div>
          <div>
            <label for="license_state">License State</label>
            <input id="license_state" name="license_state" type="text" value="{{ form_data.license_state }}" required />
          </div>
          <div>
            <label for="license_number">License Number</label>
            <input id="license_number" name="license_number" type="text" value="{{ form_data.license_number }}" required />
          </div>
          <div>
            <label for="license_expires">License Expiration</label>
            <input id="license_expires" name="license_expires" type="date" value="{{ form_data.license_expires }}" />
          </div>
          <div>
            <label for="insurance_provider">Insurance Provider</label>
            <input id="insurance_provider" name="insurance_provider" type="text" value="{{ form_data.insurance_provider }}" required />
          </div>
          <div>
            <label for="insurance_policy">Insurance Policy</label>
            <input id="insurance_policy" name="insurance_policy" type="text" value="{{ form_data.insurance_policy }}" required />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required />
          </div>
          <div>
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="6" required />
          </div>
        </div>
        <button type="submit">Create Driver Account</button>
      </form>

      <div class="helper-links">
        <a href="{{ url_for('signup_home') }}">Back</a>
        <a href="{{ url_for('rider_signup') }}">Rider Sign-Up</a>
      </div>
    </main>
  </body>
</html>
